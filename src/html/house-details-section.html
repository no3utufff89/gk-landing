<section class="house-details-section">
    <div class="container">
        <h2 class="house-details-section__title">Посмотрите на ваш дом в деталях</h2>
        <ul class="house-slider">
            <button
                class="slider-btn slider-btn_left house-slider__control"
                aria-label="Стрелка влево"
            >
                <svg class="icon">
                    <use xlink:href="@img/icons/sprite.svg#arrow-down_icon"></use>
                </svg>
            </button>
            <button
                class="slider-btn slider-btn_right house-slider__control"
                aria-label="Стрелка вправо"
            >
                <svg class="icon">
                    <use xlink:href="@img/icons/sprite.svg#arrow-down_icon"></use>
                </svg>
            </button>
            <li class="house-slider__item">
                <img
                    src="@img/slider/house/house-slide_01.jpeg"
                    alt=""
                    class="house-slider__slide-image"
                />
                <button class="resize-btn house-slider__btn">
                    <svg class="icon">
                        <use xlink:href="@img/icons/sprite.svg#resize_icon"></use>
                    </svg>
                </button>
            </li>
            <li class="house-slider__item">
                <img
                    src="@img/slider/house/house-slide_02.jpeg"
                    alt=""
                    class="house-slider__slide-image"
                />
                <button class="resize-btn house-slider__btn">
                    <svg class="icon">
                        <use xlink:href="@img/icons/sprite.svg#resize_icon"></use>
                    </svg>
                </button>
            </li>
            <li class="house-slider__item">
                <img
                    src="@img/slider/house/house-slide_03.jpeg"
                    alt=""
                    class="house-slider__slide-image"
                />
                <button class="resize-btn house-slider__btn">
                    <svg class="icon">
                        <use xlink:href="@img/icons/sprite.svg#resize_icon"></use>
                    </svg>
                </button>
            </li>
        </ul>
    </div>
</section>
